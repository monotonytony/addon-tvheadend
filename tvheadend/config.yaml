---
name: TVHeadend
version: dev
stage: stable
slug: tvheadend
description: TV streaming server and recorder.
url: "https://github.com/monotonytony/addon-tvheadend"
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
webui: "http://[HOST]:[PORT:9981]/"
privileged: false
full_access: false
devices:
  - /dev/dvb/adapter0/demux0:/dev/dvb/adapter0/demux0
  - /dev/dvb/adapter0/dvr0:/dev/dvb/adapter0/dvr0
  - /dev/dvb/adapter0/frontend0:/dev/dvb/adapter0/frontend0
  - /dev/dvb/adapter0/net0:/dev/dvb/adapter0/net0
ports:
  9981/tcp: 9981
  9982/tcp: 9982
ports_description:
  9981/tcp: TVH Web Interface
  9982/tcp: TVH HTSP
map:
  - "config:rw"
options:
  system_packages: []
  init_commands: []
schema:
  system_packages:
    - str
  init_commands:
    - str
